name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pyright

      - name: Lint (ruff)
        run: ruff check backend/ scripts/

      - name: Type check (pyright)
        run: pyright backend/
        continue-on-error: true   # warnings only until we reach full coverage

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          QDRANT_URL: http://localhost:6333
          QDRANT_API_KEY: ""
          LLM_PROVIDER: ollama
          LLM_MODEL: qwen2.5:7b

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit
