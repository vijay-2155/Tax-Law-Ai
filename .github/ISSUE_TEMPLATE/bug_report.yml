name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: dropdown
    id: setup
    attributes:
      label: Setup method
      options:
        - Docker Compose (./start.sh or start.bat)
        - Manual (run.sh)
        - Windows .exe (PyInstaller)
    validations:
      required: true

  - type: dropdown
    id: llm_provider
    attributes:
      label: LLM Provider
      options:
        - Ollama Cloud (signed-in)
        - Ollama Cloud (API key)
        - Ollama Local
        - OpenAI
        - Anthropic
        - Gemini
        - Groq
        - OpenRouter
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 22.04, Windows 11, macOS 14"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Ask '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Run `docker compose logs app` and paste any errors here."
      render: shell
