name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I'm trying to do X but currently..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "It would be great if..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat / RAG pipeline
        - Section Browser
        - Act Comparison
        - LLM Provider support
        - UI / Frontend
        - Docker / Setup
        - Performance
        - Other
    validations:
      required: true
