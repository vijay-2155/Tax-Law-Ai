# ─────────────────────────────────────────────────────────────────────────────
# TaxIQ — Docker Compose
#
# Services:
#   qdrant  — Local vector database (no account needed)
#   app     — FastAPI backend + React frontend
#
# Usage:
#   First run:       docker compose up        (builds image, ~5 min)
#   Subsequent:      docker compose up -d     (starts in ~30 sec)
#   Stop:            docker compose down
#   Full reset:      docker compose down -v   (WARNING: clears all data)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Qdrant local vector database ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"     # REST API (used by the app)
      - "6334:6334"     # gRPC (optional)
    volumes:
      - qdrant_data:/qdrant/storage    # vectors persist across restarts
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ── TaxIQ app (FastAPI backend + React frontend) ──────────────────────────────
  app:
    image: ghcr.io/vijay-2155/tax-law-ai:latest   # pre-built — no source code needed
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"  # localhost only — blocks public internet access
    depends_on:
      qdrant:
        condition: service_healthy    # wait for Qdrant to be ready
    environment:
      # Local Qdrant — no API key needed
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      # Ollama signed-in mode: point to host machine's Ollama daemon
      # host.docker.internal resolves to your PC on Mac/Windows/Linux (Docker 20.10+)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"   # needed on Linux
    env_file:
      - .env                           # user's LLM API keys (Ollama Cloud, etc.)
    volumes:
      - hf_models:/cache/huggingface   # cache HF embedding + reranker models
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s               # allow time for HF model downloads on first run


# ── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  qdrant_data:    # Qdrant vector database — persists between restarts
  hf_models:      # HuggingFace embedding + reranker models (~3.7 GB, downloaded once)
